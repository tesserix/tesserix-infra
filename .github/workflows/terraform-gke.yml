# =============================================================================
# TERRAFORM: GKE cluster + K8s bootstrap
# =============================================================================
# Runs stacks 05-gke and 06-k8s-bootstrap sequentially.
# Plan on PR, apply on push to main.
# =============================================================================
name: Terraform (GKE)

on:
  push:
    branches: [main]
    paths:
      - "terraform/05-gke/**"
      - "terraform/06-k8s-bootstrap/**"
  pull_request:
    paths:
      - "terraform/05-gke/**"
      - "terraform/06-k8s-bootstrap/**"
  workflow_dispatch:
    inputs:
      stack:
        description: "Stack to apply (05-gke, 06-k8s-bootstrap, all)"
        default: "all"
        type: choice
        options: [05-gke, 06-k8s-bootstrap, all]
      action:
        description: "Action"
        default: "plan"
        type: choice
        options: [plan, apply]

env:
  TF_VAR_project_id: ${{ vars.PROJECT_ID }}
  TF_VAR_region: asia-south1
  TF_VAR_state_bucket: ${{ vars.STATE_BUCKET }}

jobs:
  gke-cluster:
    name: "05-gke"
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_dispatch' ||
      contains(fromJSON('["05-gke","all"]'), github.event.inputs.stack)
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.CI_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.0

      - name: Terraform Init
        working-directory: terraform/05-gke
        run: terraform init -backend-config="bucket=${{ vars.STATE_BUCKET }}"

      - name: Terraform Plan
        working-directory: terraform/05-gke
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' || github.event.inputs.action == 'apply'
        working-directory: terraform/05-gke
        run: terraform apply -auto-approve tfplan

  k8s-bootstrap:
    name: "06-k8s-bootstrap"
    needs: gke-cluster
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_dispatch' ||
      contains(fromJSON('["06-k8s-bootstrap","all"]'), github.event.inputs.stack)
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.CI_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.0

      - name: Terraform Init
        working-directory: terraform/06-k8s-bootstrap
        run: terraform init -backend-config="bucket=${{ vars.STATE_BUCKET }}"

      - name: Terraform Plan
        working-directory: terraform/06-k8s-bootstrap
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' || github.event.inputs.action == 'apply'
        working-directory: terraform/06-k8s-bootstrap
        run: terraform apply -auto-approve tfplan
