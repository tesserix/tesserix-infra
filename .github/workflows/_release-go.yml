name: Release Go Service

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_title:
        required: true
        type: string
      go_version:
        required: false
        type: string
        default: '1.24'
      platforms:
        required: false
        type: string
        default: 'linux/amd64'
    secrets:
      GO_PRIVATE_TOKEN:
        required: true
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: true
      GCP_SERVICE_ACCOUNT:
        required: true
    outputs:
      version:
        description: 'Release version (without v prefix)'
        value: ${{ jobs.release.outputs.version }}
      image:
        description: 'Full GAR image URI with tag'
        value: ${{ jobs.release.outputs.image }}
      digest:
        description: 'Image digest'
        value: ${{ jobs.release.outputs.digest }}

env:
  REGISTRY: ghcr.io
  GAR_REGISTRY: asia-south1-docker.pkg.dev
  GCP_PROJECT_ID: tesserix
  GAR_REPOSITORY: services

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}
      - name: Configure private modules
        run: git config --global url."https://${TOKEN}@github.com/".insteadOf "https://github.com/"
        env:
          TOKEN: ${{ secrets.GO_PRIVATE_TOKEN }}
          GOPRIVATE: github.com/tesserix/*
      - run: go vet ./...
      - run: go test -v -race ./...

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [quality]
    outputs:
      version: ${{ steps.version.outputs.version }}
      image: ${{ steps.tags.outputs.gar_image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Compute image tags
        id: tags
        run: |
          echo "gar_image=${{ env.GAR_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ inputs.service_name }}:${{ steps.version.outputs.version }}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to GCP
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ env.GCP_PROJECT_ID }}
          token_format: access_token

      - name: Log in to GAR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GAR_REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ github.repository }}
            ${{ env.GAR_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ inputs.service_name }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ inputs.platforms }}
          build-args: GITHUB_TOKEN=${{ secrets.GO_PRIVATE_TOKEN }}
          cache-from: type=gha,scope=release
          cache-to: type=gha,mode=max,scope=release

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.version.outputs.version }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
        continue-on-error: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: Attest image provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
        continue-on-error: true

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            try {
              await github.rest.repos.createRelease({
                owner: context.repo.owner, repo: context.repo.repo,
                tag_name: '${{ steps.version.outputs.tag }}',
                name: `${{ inputs.service_title }} v${version}`,
                body: `## ${{ inputs.service_title }} v${version}\n\n\`\`\`\ndocker pull ${{ env.REGISTRY }}/${{ github.repository }}:${version}\n\`\`\`\n\n**Digest:** \`${{ steps.build.outputs.digest }}\``,
                draft: false, prerelease: version.includes('-'),
              });
            } catch (e) { if (e.status !== 422) throw e; }
