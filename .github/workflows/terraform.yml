name: Terraform

on:
  push:
    branches: [main]
    paths: ['terraform/**']
  pull_request:
    paths: ['terraform/**']
  workflow_dispatch:

env:
  TF_VERSION: "1.9.0"
  TF_VAR_project_id: ${{ vars.TF_VAR_PROJECT_ID }}
  TF_VAR_project_number: ${{ vars.TF_VAR_PROJECT_NUMBER }}
  TF_VAR_region: ${{ vars.TF_VAR_REGION }}
  TF_VAR_billing_account_id: ${{ secrets.TF_VAR_BILLING_ACCOUNT_ID }}
  TF_VAR_state_bucket: ${{ vars.TF_STATE_BUCKET }}
  TF_VAR_github_org: ${{ vars.TF_VAR_GITHUB_ORG }}
  TF_VAR_identity_platform_api_key: ${{ vars.TF_VAR_GIP_API_KEY }}

permissions:
  contents: read
  id-token: write    # Required for WIF
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        stack: [01-foundation, 02-core, 03-iam, 04-services]
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_CI_SA }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/${{ matrix.stack }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=${{ matrix.stack }}"

      - name: Terraform Plan
        working-directory: terraform/${{ matrix.stack }}
        run: terraform plan -no-color

  apply:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: plan
    runs-on: ubuntu-latest
    environment: production
    strategy:
      max-parallel: 1
      matrix:
        stack: [01-foundation, 02-core, 03-iam, 04-services]
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_CI_SA }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/${{ matrix.stack }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=${{ matrix.stack }}"

      - name: Terraform Apply
        working-directory: terraform/${{ matrix.stack }}
        run: terraform apply -auto-approve
