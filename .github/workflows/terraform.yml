name: Terraform

on:
  push:
    branches: [main]
    paths: ['terraform/**']
  pull_request:
    paths: ['terraform/**']
  workflow_dispatch:

env:
  TF_VERSION: "1.9.0"
  TF_VAR_project_id: ${{ vars.TF_VAR_PROJECT_ID }}
  TF_VAR_project_number: ${{ vars.TF_VAR_PROJECT_NUMBER }}
  TF_VAR_region: ${{ vars.TF_VAR_REGION }}
  TF_VAR_billing_account_id: ${{ secrets.TF_VAR_BILLING_ACCOUNT_ID }}
  TF_VAR_state_bucket: ${{ vars.TF_STATE_BUCKET }}
  TF_VAR_github_org: ${{ vars.TF_VAR_GITHUB_ORG }}
  TF_VAR_identity_platform_api_key: ${{ vars.TF_VAR_GIP_API_KEY }}

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  foundation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_CI_SA }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        working-directory: terraform/01-foundation
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=01-foundation"
      - name: Terraform Plan
        working-directory: terraform/01-foundation
        run: terraform plan -no-color
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        working-directory: terraform/01-foundation
        run: terraform apply -auto-approve

  core:
    needs: foundation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_CI_SA }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        working-directory: terraform/02-core
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=02-core"
      - name: Terraform Plan
        working-directory: terraform/02-core
        run: terraform plan -no-color
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        working-directory: terraform/02-core
        run: terraform apply -auto-approve

  iam:
    needs: core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_CI_SA }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        working-directory: terraform/03-iam
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=03-iam"
      - name: Terraform Plan
        working-directory: terraform/03-iam
        run: terraform plan -no-color
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        working-directory: terraform/03-iam
        run: terraform apply -auto-approve

  services:
    needs: iam
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_CI_SA }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        working-directory: terraform/04-services
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=04-services"
      - name: Migrate state to for_each resources
        working-directory: terraform/04-services
        run: |
          # Standard DB services (old individual → for_each standard)
          terraform state mv 'google_cloud_run_v2_service.audit_service' 'google_cloud_run_v2_service.standard["audit-service"]' 2>/dev/null || true
          terraform state mv 'google_cloud_run_v2_service.tenant_service' 'google_cloud_run_v2_service.standard["tenant-service"]' 2>/dev/null || true
          terraform state mv 'google_cloud_run_v2_service.notification_service' 'google_cloud_run_v2_service.standard["notification-service"]' 2>/dev/null || true
          terraform state mv 'google_cloud_run_v2_service.tickets_service' 'google_cloud_run_v2_service.standard["tickets-service"]' 2>/dev/null || true
          terraform state mv 'google_cloud_run_v2_service.subscription_service' 'google_cloud_run_v2_service.standard["subscription-service"]' 2>/dev/null || true
          terraform state mv 'google_cloud_run_v2_service.document_service' 'google_cloud_run_v2_service.standard["document-service"]' 2>/dev/null || true
          terraform state mv 'google_cloud_run_v2_service.location_service' 'google_cloud_run_v2_service.standard["location-service"]' 2>/dev/null || true
          terraform state mv 'google_cloud_run_v2_service.verification_service' 'google_cloud_run_v2_service.standard["verification-service"]' 2>/dev/null || true
          terraform state mv 'google_cloud_run_v2_service.analytics_service' 'google_cloud_run_v2_service.standard["analytics-service"]' 2>/dev/null || true
          terraform state mv 'google_cloud_run_v2_service.tenant_router_service' 'google_cloud_run_v2_service.standard["tenant-router-service"]' 2>/dev/null || true
          # Simple services
          terraform state mv 'google_cloud_run_v2_service.qr_service' 'google_cloud_run_v2_service.simple["qr-service"]' 2>/dev/null || true
          terraform state mv 'google_cloud_run_v2_service.feature_flags' 'google_cloud_run_v2_service.simple["feature-flags-service"]' 2>/dev/null || true
          # IAM members (old keys → new service-name keys)
          terraform state mv 'google_cloud_run_service_iam_member.public_access["analytics"]' 'google_cloud_run_service_iam_member.public_access["analytics-service"]' 2>/dev/null || true
          terraform state mv 'google_cloud_run_service_iam_member.public_access["document"]' 'google_cloud_run_service_iam_member.public_access["document-service"]' 2>/dev/null || true
          terraform state mv 'google_cloud_run_service_iam_member.public_access["notification"]' 'google_cloud_run_service_iam_member.public_access["notification-service"]' 2>/dev/null || true
          terraform state mv 'google_cloud_run_service_iam_member.public_access["status"]' 'google_cloud_run_service_iam_member.public_access["status-service"]' 2>/dev/null || true
          terraform state mv 'google_cloud_run_service_iam_member.public_access["subscription"]' 'google_cloud_run_service_iam_member.public_access["subscription-service"]' 2>/dev/null || true
          terraform state mv 'google_cloud_run_service_iam_member.public_access["verification"]' 'google_cloud_run_service_iam_member.public_access["verification-service"]' 2>/dev/null || true
      - name: Terraform Plan
        working-directory: terraform/04-services
        run: terraform plan -no-color
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        working-directory: terraform/04-services
        run: terraform apply -auto-approve
