name: Cleanup GAR Images

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      keep_count:
        required: false
        type: number
        default: 5
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: true
      GCP_SERVICE_ACCOUNT:
        required: true

env:
  GAR_REGISTRY: asia-south1-docker.pkg.dev
  GCP_PROJECT_ID: tesserix
  GAR_REPOSITORY: services

jobs:
  cleanup:
    name: Cleanup old images
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Delete old images (keep latest ${{ inputs.keep_count }})
        run: |
          IMAGE="${{ env.GAR_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ inputs.service_name }}"
          DIGESTS=$(gcloud artifacts docker images list "$IMAGE" \
            --format="get(version)" \
            --sort-by="~UPDATE_TIME" \
            --filter="tags:*" \
            --project="${{ env.GCP_PROJECT_ID }}" 2>/dev/null | tail -n +$((inputs.keep_count + 1)))

          if [[ -z "$DIGESTS" ]]; then
            echo "No images to clean up"
            exit 0
          fi

          for DIGEST in $DIGESTS; do
            echo "Deleting: $IMAGE@$DIGEST"
            gcloud artifacts docker images delete "$IMAGE@$DIGEST" \
              --project="${{ env.GCP_PROJECT_ID }}" \
              --quiet --delete-tags 2>/dev/null || true
          done
          echo "Cleanup complete"
