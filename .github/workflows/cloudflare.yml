name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - 'cloudflare/**'
  workflow_dispatch:
  repository_dispatch:
    types: [cloudrun-deployed]

permissions:
  contents: read
  id-token: write

jobs:
  deploy-worker:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_CI_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve Cloud Run service URLs
        run: |
          set -euo pipefail
          AUTH_BFF_URL=$(gcloud run services describe auth-bff \
            --region=asia-south1 --project=tesserix \
            --format="value(status.url)")
          TESSERIX_HOME_URL=$(gcloud run services describe tesserix-home \
            --region=asia-south1 --project=tesserix \
            --format="value(status.url)")
          MARKETPLACE_ONBOARDING_URL=$(gcloud run services describe marketplace-onboarding \
            --region=asia-south1 --project=tesserix \
            --format="value(status.url)")

          echo "AUTH_BFF_URL=${AUTH_BFF_URL}" >> $GITHUB_ENV
          echo "TESSERIX_HOME_URL=${TESSERIX_HOME_URL}" >> $GITHUB_ENV
          echo "MARKETPLACE_ONBOARDING_URL=${MARKETPLACE_ONBOARDING_URL}" >> $GITHUB_ENV
          echo "Resolved URLs:"
          echo "  auth-bff: ${AUTH_BFF_URL}"
          echo "  tesserix-home: ${TESSERIX_HOME_URL}"
          echo "  marketplace-onboarding: ${MARKETPLACE_ONBOARDING_URL}"

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: cloudflare
          command: deploy --var AUTH_BFF_URL:${{ env.AUTH_BFF_URL }} --var TESSERIX_HOME_URL:${{ env.TESSERIX_HOME_URL }} --var MARKETPLACE_ONBOARDING_URL:${{ env.MARKETPLACE_ONBOARDING_URL }}
