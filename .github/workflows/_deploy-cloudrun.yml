name: Deploy to Cloud Run

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
        description: 'Cloud Run service name'
      image:
        required: true
        type: string
        description: 'Full image URI with tag'
      container_name:
        required: false
        type: string
        default: ''
        description: 'Container name for multi-container services (sidecar setup)'
      region:
        required: false
        type: string
        default: 'asia-south1'
      project:
        required: false
        type: string
        default: 'tesserix'
      environment:
        required: false
        type: string
        default: 'production'
        description: 'GitHub Environment name'
      health_path:
        required: false
        type: string
        default: '/health'
        description: 'Health check endpoint path'
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: true
      GCP_SERVICE_ACCOUNT:
        required: true
      DISPATCH_TOKEN:
        required: false

jobs:
  deploy:
    name: Deploy ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Capture current revision before deploy
        id: pre_deploy
        run: |
          set -euo pipefail
          CURRENT=$(gcloud run services describe "${{ inputs.service_name }}" \
            --region="${{ inputs.region }}" \
            --project="${{ inputs.project }}" \
            --format="value(status.traffic[0].revisionName)" 2>/dev/null || echo "")
          echo "revision=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "Current active revision: ${CURRENT:-none}"

      - name: Deploy to Cloud Run
        run: |
          set -euo pipefail
          CONTAINER_FLAG=""
          if [[ -n "${{ inputs.container_name }}" ]]; then
            CONTAINER_FLAG="--container ${{ inputs.container_name }}"
          fi
          gcloud run services update "${{ inputs.service_name }}" \
            $CONTAINER_FLAG \
            --image "${{ inputs.image }}" \
            --region "${{ inputs.region }}" \
            --project "${{ inputs.project }}" \
            --quiet

      - name: Route traffic to new revision
        id: route
        run: |
          set -euo pipefail
          # Get the latest revision (just deployed)
          LATEST=$(gcloud run revisions list \
            --service=${{ inputs.service_name }} \
            --region=${{ inputs.region }} \
            --project=${{ inputs.project }} \
            --sort-by=~createTime \
            --limit=1 \
            --format="value(name)")
          echo "latest_revision=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Routing 100% traffic to ${LATEST}"
          gcloud run services update-traffic ${{ inputs.service_name }} \
            --region=${{ inputs.region }} \
            --project=${{ inputs.project }} \
            --to-revisions="${LATEST}=100"

      - name: Smoke test
        run: |
          set -euo pipefail
          SERVICE_URL=$(gcloud run services describe ${{ inputs.service_name }} \
            --region=${{ inputs.region }} \
            --project=${{ inputs.project }} \
            --format="value(status.url)")

          echo "Testing ${SERVICE_URL}${{ inputs.health_path }}"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${SERVICE_URL}${{ inputs.health_path }}" || true)
            if [[ "$STATUS" == "200" ]]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, waiting 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          set -euo pipefail
          echo "Smoke test failed, rolling back..."
          PREVIOUS="${{ steps.pre_deploy.outputs.revision }}"

          if [[ -n "$PREVIOUS" ]]; then
            gcloud run services update-traffic ${{ inputs.service_name }} \
              --region=${{ inputs.region }} \
              --project=${{ inputs.project }} \
              --to-revisions="${PREVIOUS}=100"
            echo "::warning::Rolled back to revision: ${PREVIOUS}"
          else
            echo "::error::No previous revision found, cannot rollback"
          fi

      - name: Trigger Cloudflare Worker update
        if: success() && env.HAS_DISPATCH_TOKEN == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: tesserix/tesserix-infra
          event-type: cloudrun-deployed
          client-payload: '{"service": "${{ inputs.service_name }}"}'
        continue-on-error: true
        env:
          HAS_DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN != '' }}

      - name: Deploy Summary
        if: always()
        run: |
          echo "## Cloud Run Deployment" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** ${{ inputs.service_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ inputs.image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** ${{ inputs.region }}" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
