# =============================================================================
# SERVICE REGISTRY — Single source of truth for all Tesserix services
# =============================================================================
# Used by: Terraform (infra), tesserix-home (release UI), go-shared (dispatch)
# =============================================================================

defaults:
  owner: tesserix
  region: asia-south1
  project: tesserix
  buildWorkflow: ci.yml
  releaseWorkflow: release.yml
  goVersion: "1.26"
  nodeVersion: "22"
  cloudSqlProxy: "gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.3"

goShared:
  repo: tesserix/go-shared
  # Dependent repos are auto-derived from services where usesGoShared: true

services:
  # ---------------------------------------------------------------------------
  # PLATFORM SERVICES (shared across all products)
  # ---------------------------------------------------------------------------

  auth-bff:
    displayName: Auth BFF
    type: backend
    lang: go
    appGroup: platform
    hasDb: false
    migration: none
    usesGoShared: true
    sidecar: none
    invokes: [openfga, tenant-service]
    publishesEvents: true
    pubsubTopic: tesserix-audit-events
    secrets:
      - auth-bff-cookie-encryption-key
      - auth-bff-csrf-secret
      - openfga-preshared-key
      - platform-client-secret
    storageApps: []

  openfga:
    displayName: OpenFGA
    type: backend
    lang: go
    appGroup: platform
    managed: false # Uses openfga/openfga image, not custom-built
    hasDb: true
    migration: none
    usesGoShared: false
    sidecar: cloud-sql-proxy
    invokes: []
    publishesEvents: false
    pubsubTopic: ""
    secrets:
      - openfga-preshared-key
      - openfga-db-password
      - openfga-db-uri
    storageApps: []

  audit-service:
    displayName: Audit Service
    type: backend
    lang: go
    appGroup: platform
    hasDb: true
    migration: gorm-auto
    usesGoShared: true
    sidecar: cloud-sql-proxy
    invokes: [openfga]
    publishesEvents: false
    pubsubTopic: ""
    secrets:
