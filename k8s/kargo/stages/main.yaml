# =============================================================================
# KARGO MAIN STAGE — auto-promotes new images to main branch
# =============================================================================
# When CI pushes a new image, Kargo updates kustomize image tags on main.
# ArgoCD auto-syncs the changes to the cluster.
# =============================================================================
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: main
  namespace: tesserix
spec:
  subscriptions:
    warehouse: gar-services
  promotionMechanisms:
    gitRepoUpdates:
      - repoURL: https://github.com/tesserix/tesserix-infra.git
        writeBranch: main
        kustomize:
          images:
            - image: asia-south1-docker.pkg.dev/tesserix-app/services
              path: k8s/apps
