apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: staging
  namespace: tesserix
spec:
  subscriptions:
    warehouse: gar-services
  promotionMechanisms:
    gitRepoUpdates:
      - repoURL: https://github.com/tesserix/tesserix-infra.git
        writeBranch: main
        kustomize:
          images:
            - image: asia-south1-docker.pkg.dev/tesserix/services
              path: k8s/apps
