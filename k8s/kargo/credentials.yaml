# =============================================================================
# KARGO CREDENTIALS — git repo access for writing image tag updates
# =============================================================================
# Kargo needs write access to push kustomize image tag changes to main branch.
# The actual token is managed via External Secrets Operator.
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: kargo-repo-credentials
  namespace: tesserix
  labels:
    kargo.akuity.io/cred-type: git
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: kargo-repo-credentials
    template:
      metadata:
        labels:
          kargo.akuity.io/cred-type: git
      data:
        repoURL: https://github.com/tesserix/tesserix-infra.git
        username: tesserix-kargo
        password: "{{ .kargo_github_token }}"
  data:
    - secretKey: kargo_github_token
      remoteRef:
        key: kargo-github-token
