apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: tesserix-gateway
  namespace: istio-system
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "tesserix.app"
        - "*.tesserix.app"
        - "mark8ly.com"
        - "*.mark8ly.com"
        - "*-admin.mark8ly.com"
