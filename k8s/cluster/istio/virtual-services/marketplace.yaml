# =============================================================================
# MARKETPLACE ROUTING: *.mark8ly.com
# =============================================================================
# Each marketplace tenant gets a subdomain: {slug}.mark8ly.com
# Cloudflare Tunnel → istio-ingressgateway → VirtualService → Knative Service
# =============================================================================
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: marketplace-storefront-routes
  namespace: marketplace
spec:
  hosts:
    - "*.mark8ly.com"
  gateways:
    - istio-system/tesserix-gateway
  http:
    # API routes → Go backend services
    - match:
        - uri:
            prefix: /api/v1/products
      timeout: 15s
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: 5xx,reset,connect-failure
      route:
        - destination:
            host: mp-products.marketplace.svc.cluster.local
            port:
              number: 80
    - match:
        - uri:
            prefix: /api/v1/orders
      timeout: 15s
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: 5xx,reset,connect-failure
      route:
        - destination:
            host: mp-orders.marketplace.svc.cluster.local
            port:
              number: 80
    - match:
        - uri:
            prefix: /api/v1/categories
      timeout: 15s
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: 5xx,reset,connect-failure
      route:
        - destination:
            host: mp-categories.marketplace.svc.cluster.local
            port:
              number: 80
    - match:
        - uri:
            prefix: /api/v1/reviews
      timeout: 15s
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: 5xx,reset,connect-failure
      route:
        - destination:
            host: mp-reviews.marketplace.svc.cluster.local
            port:
              number: 80
    - match:
        - uri:
            prefix: /api/v1/cart
      timeout: 15s
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: 5xx,reset,connect-failure
      route:
        - destination:
            host: mp-orders.marketplace.svc.cluster.local
            port:
              number: 80
    - match:
        - uri:
            prefix: /api/v1/shipping
      timeout: 15s
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: 5xx,reset,connect-failure
      route:
        - destination:
            host: mp-shipping.marketplace.svc.cluster.local
            port:
              number: 80
    - match:
        - uri:
            prefix: /api/v1/payments
      timeout: 15s
      retries:
        attempts: 2
        perTryTimeout: 5s
        retryOn: reset,connect-failure
      route:
        - destination:
            host: mp-payments.marketplace.svc.cluster.local
            port:
              number: 80
    - match:
        - uri:
            prefix: /api/v1/coupons
      timeout: 15s
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: 5xx,reset,connect-failure
      route:
        - destination:
            host: mp-coupons.marketplace.svc.cluster.local
            port:
              number: 80
    - match:
        - uri:
            prefix: /api/v1/gift-cards
      timeout: 15s
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: 5xx,reset,connect-failure
      route:
        - destination:
            host: mp-gift-cards.marketplace.svc.cluster.local
            port:
              number: 80
    - match:
        - uri:
            prefix: /api/v1/inventory
      timeout: 15s
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: 5xx,reset,connect-failure
      route:
        - destination:
            host: mp-inventory.marketplace.svc.cluster.local
            port:
              number: 80
    - match:
        - uri:
            prefix: /api/v1/vendors
      timeout: 15s
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: 5xx,reset,connect-failure
      route:
        - destination:
            host: mp-vendors.marketplace.svc.cluster.local
            port:
              number: 80
    - match:
        - uri:
            prefix: /api/v1/customers
      timeout: 15s
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: 5xx,reset,connect-failure
      route:
        - destination:
            host: mp-customers.marketplace.svc.cluster.local
            port:
              number: 80
    - match:
        - uri:
            prefix: /api/v1/staff
      timeout: 15s
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: 5xx,reset,connect-failure
      route:
        - destination:
            host: mp-staff.marketplace.svc.cluster.local
            port:
              number: 80
    - match:
        - uri:
            prefix: /api/v1/content
      timeout: 15s
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: 5xx,reset,connect-failure
      route:
        - destination:
            host: mp-content.marketplace.svc.cluster.local
            port:
              number: 80
    - match:
        - uri:
            prefix: /api/v1/approvals
      timeout: 15s
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: 5xx,reset,connect-failure
      route:
        - destination:
            host: mp-approvals.marketplace.svc.cluster.local
            port:
              number: 80
    - match:
        - uri:
            prefix: /api/v1/marketing
      timeout: 15s
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: 5xx,reset,connect-failure
      route:
        - destination:
            host: mp-marketing.marketplace.svc.cluster.local
            port:
              number: 80
    - match:
        - uri:
            prefix: /api/v1/tax
      timeout: 15s
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: 5xx,reset,connect-failure
      route:
        - destination:
            host: mp-tax.marketplace.svc.cluster.local
            port:
              number: 80
    - match:
        - uri:
            prefix: /api/v1/connector
      timeout: 15s
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: 5xx,reset,connect-failure
      route:
        - destination:
            host: mp-connector.marketplace.svc.cluster.local
            port:
              number: 80
    # Default: storefront Next.js app
    - match:
        - uri:
            prefix: /
      timeout: 30s
      route:
        - destination:
            host: mp-storefront.marketplace.svc.cluster.local
            port:
              number: 80
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: marketplace-admin-routes
  namespace: marketplace
spec:
  hosts:
    - "*-admin.mark8ly.com"
  gateways:
    - istio-system/tesserix-gateway
  http:
    - match:
        - uri:
            prefix: /
      timeout: 30s
      route:
        - destination:
            host: marketplace-admin.marketplace.svc.cluster.local
            port:
              number: 80
