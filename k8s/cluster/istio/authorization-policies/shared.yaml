# Shared namespace: allow calls from platform, marketplace, and internal
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-platform-to-shared
  namespace: shared
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces: ["platform"]
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-marketplace-to-shared
  namespace: shared
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces: ["marketplace"]
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-shared-internal
  namespace: shared
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces: ["shared"]
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-gateway
  namespace: shared
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces: ["istio-system"]
