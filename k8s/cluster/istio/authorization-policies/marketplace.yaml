# Marketplace namespace: allow ingress, platform, and internal calls
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-gateway
  namespace: marketplace
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces: ["istio-system"]
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-platform-to-marketplace
  namespace: marketplace
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces: ["platform"]
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-shared-to-marketplace
  namespace: marketplace
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces: ["shared"]
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-marketplace-internal
  namespace: marketplace
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces: ["marketplace"]
