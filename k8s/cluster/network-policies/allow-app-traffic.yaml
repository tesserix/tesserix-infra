# Allow cross-namespace app traffic, Cloud SQL, and GCP APIs.
---
# Platform: allow egress to shared, Cloud SQL, GCP APIs
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-app-egress
  namespace: platform
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: marketplace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: shared
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: shared
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
---
# Shared: allow from platform + marketplace, egress to Cloud SQL + GCP APIs
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-app-egress
  namespace: shared
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: marketplace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: shared
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: shared
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: marketplace
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
---
# Marketplace: allow from ingress + internal, egress to shared + Cloud SQL
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-app-egress
  namespace: marketplace
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: marketplace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: shared
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: shared
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: marketplace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
