apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-appsets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/tesserix/tesserix-infra.git
    targetRevision: main
    path: k8s/argocd/appsets
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
