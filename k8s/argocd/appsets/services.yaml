# =============================================================================
# APPLICATIONSET — auto-discovers services from k8s/apps/ directories
# =============================================================================
# Adding a new service = adding a directory in k8s/apps/<namespace>/<service>.
# No ArgoCD config changes needed.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-services
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/tesserix/tesserix-infra.git
        revision: main
        directories:
          - path: k8s/apps/platform/*
  template:
    metadata:
      name: "{{ .path.basename }}"
    spec:
      project: platform
      source:
        repoURL: https://github.com/tesserix/tesserix-infra.git
        targetRevision: main
        path: "{{ .path.path }}"
      destination:
        server: https://kubernetes.default.svc
        namespace: platform
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
---
