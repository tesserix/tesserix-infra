apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
spec:
  description: Platform services (auth-bff, tesserix-home)
  sourceRepos:
    - https://github.com/tesserix/tesserix-infra.git
  destinations:
    - namespace: platform
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: serving.knative.dev
      kind: Service
    - group: external-secrets.io
      kind: ExternalSecret
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: shared
  namespace: argocd
spec:
  description: Shared services (OpenFGA, audit, notification, tenant, etc.)
  sourceRepos:
    - https://github.com/tesserix/tesserix-infra.git
  destinations:
    - namespace: shared
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: serving.knative.dev
      kind: Service
    - group: external-secrets.io
      kind: ExternalSecret
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: marketplace
  namespace: argocd
spec:
  description: Marketplace services (mp-*, marketplace-admin, storefront)
  sourceRepos:
    - https://github.com/tesserix/tesserix-infra.git
  destinations:
    - namespace: marketplace
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: serving.knative.dev
      kind: Service
    - group: external-secrets.io
      kind: ExternalSecret
