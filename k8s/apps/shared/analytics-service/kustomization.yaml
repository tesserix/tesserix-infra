apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: shared

resources:
  - ../../../bases/go-service
  - external-secret.yaml
  - configmap.yaml

patches:
  - target:
      kind: Service
      name: SERVICE_NAME
    patch: |
      - op: replace
        path: /metadata/name
        value: analytics-service
      - op: replace
        path: /spec/template/spec/serviceAccountName
        value: analytics-service
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/0/configMapRef/name
        value: analytics-service-config
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/1/secretRef/name
        value: analytics-service-secrets
  - target:
      kind: ServiceAccount
      name: SERVICE_NAME
    patch: |
      - op: replace
        path: /metadata/name
        value: analytics-service
      - op: replace
        path: /metadata/annotations/iam.gke.io~1gcp-service-account
        value: sa-analytics-service@tesserix-app.iam.gserviceaccount.com
  - target:
      kind: Service
      name: analytics-service
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/ports/0/containerPort
        value: 8091
      - op: replace
        path: /spec/template/spec/containers/0/startupProbe/httpGet/port
        value: 8091
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/httpGet/port
        value: 8091
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/httpGet/port
        value: 8091

images:
  - name: PLACEHOLDER
    newName: asia-south1-docker.pkg.dev/tesserix-app/services/analytics-service
    newTag: latest
