apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: verification-service-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: verification-service-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: verifications-db-password
        version: latest
    - secretKey: INTERNAL_SERVICE_KEY
      remoteRef:
        key: shared-internal-service-key
        version: latest
    - secretKey: ENCRYPTION_KEY
      remoteRef:
        key: verification-encryption-key
        version: latest
