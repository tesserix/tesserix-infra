apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: marketplace

resources:
  - configmap.yaml
  - ../../../bases/nextjs-service

patches:
  - target:
      kind: Service
      name: SERVICE_NAME
    patch: |
      - op: replace
        path: /metadata/name
        value: mp-storefront
      - op: replace
        path: /spec/template/spec/serviceAccountName
        value: mp-storefront
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/0/configMapRef/name
        value: mp-storefront-config
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/1/secretRef/name
        value: mp-storefront-secrets
  - target:
      kind: ServiceAccount
      name: SERVICE_NAME
    patch: |
      - op: replace
        path: /metadata/name
        value: mp-storefront
      - op: replace
        path: /metadata/annotations/iam.gke.io~1gcp-service-account
        value: sa-mp-storefront@tesserix.iam.gserviceaccount.com

images:
  - name: PLACEHOLDER
    newName: asia-south1-docker.pkg.dev/tesserix/services/mp-storefront
    newTag: latest
