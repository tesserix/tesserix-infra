apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: marketplace

resources:
  - ../../../bases/go-service
  - external-secret.yaml
  - configmap.yaml

patches:
  - target:
      kind: Service
      name: SERVICE_NAME
    patch: |
      - op: replace
        path: /metadata/name
        value: mp-orders
      - op: replace
        path: /spec/template/spec/serviceAccountName
        value: mp-orders
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/0/configMapRef/name
        value: mp-orders-config
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/1/secretRef/name
        value: mp-orders-secrets
  - target:
      kind: ServiceAccount
      name: SERVICE_NAME
    patch: |
      - op: replace
        path: /metadata/name
        value: mp-orders
      - op: replace
        path: /metadata/annotations/iam.gke.io~1gcp-service-account
        value: sa-mp-orders@tesserix-app.iam.gserviceaccount.com

images:
  - name: PLACEHOLDER
    newName: asia-south1-docker.pkg.dev/tesserix-app/services/mp-orders
    newTag: latest
