apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mp-marketing-secrets
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: mp-marketing-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: mp_marketing-db-password
        version: latest
