apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: marketplace-admin-secrets
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: marketplace-admin-secrets
    creationPolicy: Owner
  data:
    - secretKey: INTERNAL_SERVICE_KEY
      remoteRef:
        key: shared-internal-service-key
        version: latest
