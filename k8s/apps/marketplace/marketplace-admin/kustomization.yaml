apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: marketplace

resources:
  - configmap.yaml
  - ../../../bases/nextjs-service
  - external-secret.yaml

patches:
  - target:
      kind: Service
      name: SERVICE_NAME
    patch: |
      - op: replace
        path: /metadata/name
        value: marketplace-admin
      - op: replace
        path: /spec/template/spec/serviceAccountName
        value: marketplace-admin
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/0/configMapRef/name
        value: marketplace-admin-config
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/1/secretRef/name
        value: marketplace-admin-secrets
  - target:
      kind: ServiceAccount
      name: SERVICE_NAME
    patch: |
      - op: replace
        path: /metadata/name
        value: marketplace-admin
      - op: replace
        path: /metadata/annotations/iam.gke.io~1gcp-service-account
        value: sa-marketplace-admin@tesserix.iam.gserviceaccount.com

images:
  - name: PLACEHOLDER
    newName: asia-south1-docker.pkg.dev/tesserix/services/marketplace-admin
    newTag: latest
