apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: platform

resources:
  - configmap.yaml
  - ../../../bases/nextjs-service
  - external-secret.yaml

patches:
  - target:
      kind: Service
      name: SERVICE_NAME
    patch: |
      - op: replace
        path: /metadata/name
        value: tesserix-home
      - op: replace
        path: /spec/template/spec/serviceAccountName
        value: tesserix-home
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/0/configMapRef/name
        value: tesserix-home-config
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/1/secretRef/name
        value: tesserix-home-secrets
  - target:
      kind: ServiceAccount
      name: SERVICE_NAME
    patch: |
      - op: replace
        path: /metadata/name
        value: tesserix-home
      - op: replace
        path: /metadata/annotations/iam.gke.io~1gcp-service-account
        value: sa-tesserix-home@tesserix-app.iam.gserviceaccount.com

images:
  - name: PLACEHOLDER
    newName: asia-south1-docker.pkg.dev/tesserix-app/services/tesserix-home
    newTag: latest
