apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: auth-bff-secrets
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: auth-bff-secrets
    creationPolicy: Owner
  data:
    - secretKey: COOKIE_ENCRYPTION_KEY
      remoteRef:
        key: auth-bff-cookie-encryption-key
        version: latest
    - secretKey: CSRF_SECRET
      remoteRef:
        key: auth-bff-csrf-secret
        version: latest
    - secretKey: OPENFGA_API_KEY
      remoteRef:
        key: openfga-preshared-key
        version: latest
    - secretKey: PLATFORM_CLIENT_SECRET
      remoteRef:
        key: platform-client-secret
        version: latest
    - secretKey: MP_ADMIN_CLIENT_SECRET
      remoteRef:
        key: mp-admin-client-secret
        version: latest
    - secretKey: MP_STOREFRONT_CLIENT_SECRET
      remoteRef:
        key: mp-storefront-client-secret
        version: latest
    - secretKey: INTERNAL_SERVICE_KEY
      remoteRef:
        key: shared-internal-service-key
        version: latest
