apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: shared

resources:
  - ../../../bases/go-stateless
  - external-secret.yaml
  - configmap.yaml

patches:
  - target:
      kind: Service
      name: SERVICE_NAME
    patch: |
      - op: replace
        path: /metadata/name
        value: feature-flags-service
      - op: replace
        path: /spec/template/spec/serviceAccountName
        value: feature-flags-service
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/0/configMapRef/name
        value: feature-flags-service-config
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/1/secretRef/name
        value: feature-flags-service-secrets
  - target:
      kind: ServiceAccount
      name: SERVICE_NAME
    patch: |
      - op: replace
        path: /metadata/name
        value: feature-flags-service
      - op: replace
        path: /metadata/annotations/iam.gke.io~1gcp-service-account
        value: sa-feature-flags-service@tesserix-app.iam.gserviceaccount.com

images:
  - name: PLACEHOLDER
    newName: asia-south1-docker.pkg.dev/tesserix-app/services/feature-flags-service
    newTag: latest
