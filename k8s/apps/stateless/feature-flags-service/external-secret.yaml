apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: feature-flags-service-secrets
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: feature-flags-service-secrets
    creationPolicy: Owner
  data:
    - secretKey: GROWTHBOOK_API_KEY
      remoteRef:
        key: growthbook-api-key
        version: latest
    - secretKey: INTERNAL_SERVICE_KEY
      remoteRef:
        key: shared-internal-service-key
        version: latest
