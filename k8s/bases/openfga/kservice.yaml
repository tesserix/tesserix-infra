apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: openfga
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "2"
        autoscaling.knative.dev/maxScale: "10"
        autoscaling.knative.dev/target: "100"
    spec:
      serviceAccountName: openfga
      containerConcurrency: 200
      timeoutSeconds: 300
      containers:
        - name: openfga
          image: openfga/openfga:v1.8.2
          args: ["run"]
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          env:
            - name: OPENFGA_DATASTORE_ENGINE
              value: "postgres"
            - name: OPENFGA_AUTHN_METHOD
              value: "preshared"
          envFrom:
            - secretRef:
                name: openfga-secrets
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
